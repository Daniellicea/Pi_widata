{% extends "dashboard_base.html" %}
{% block dashboard_content %}
<div class="mb-4">
    <h3 class="fw-bold"><i class="fa-solid fa-calculator me-2" style="color: var(--wi-purple-light);"></i> Calculadora Financiera</h3>
    <p class="text-muted">Simula pagos de deudas o planifica tus metas de ahorro.</p>
</div>

<div class="row g-4">
    <!-- Tabs -->
    <div class="col-12">
        <div class="d-flex gap-2 mb-4">
            <button class="btn btn-widata rounded-pill px-4 active" id="btnDeuda" onclick="switchTab('deuda')">
                <i class="fa-solid fa-credit-card me-1"></i> Pagar Deuda
            </button>
            <button class="btn btn-outline-light rounded-pill px-4" id="btnAhorro" onclick="switchTab('ahorro')">
                <i class="fa-solid fa-piggy-bank me-1"></i> Meta de Ahorro
            </button>
        </div>
    </div>

    <!-- Debt Calculator -->
    <div class="col-lg-5" id="formDeuda">
        <div class="w-card">
            <h5 class="fw-bold mb-4"><i class="fa-solid fa-credit-card me-2" style="color: var(--wi-purple-light);"></i> Simulador de Pago</h5>
            <div class="mb-3">
                <label class="form-label fw-semibold">Deuda total ($)</label>
                <input type="number" class="form-control" id="inputDeuda" placeholder="50,000" min="1" step="100" value="50000">
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Tasa anual (%)</label>
                <input type="number" class="form-control" id="inputTasa" placeholder="36.5" min="0" step="0.1" value="36">
            </div>
            <div class="mb-4">
                <label class="form-label fw-semibold">Pago mensual ($)</label>
                <input type="number" class="form-control" id="inputPago" placeholder="2,500" min="1" step="100" value="2500">
            </div>
            <button class="btn btn-widata w-100 rounded-pill fw-bold" onclick="calcularDeuda()">
                <i class="fa-solid fa-chart-line me-1"></i> Calcular
            </button>
        </div>
    </div>

    <!-- Savings Calculator -->
    <div class="col-lg-5" id="formAhorro" style="display:none;">
        <div class="w-card">
            <h5 class="fw-bold mb-4"><i class="fa-solid fa-piggy-bank me-2" style="color: var(--wi-green);"></i> Meta de Ahorro</h5>
            <div class="mb-3">
                <label class="form-label fw-semibold">Meta ($)</label>
                <input type="number" class="form-control" id="inputMeta" placeholder="100,000" min="1" step="1000" value="100000">
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Ahorro mensual ($)</label>
                <input type="number" class="form-control" id="inputAhorro" placeholder="5,000" min="1" step="100" value="5000">
            </div>
            <div class="mb-4">
                <label class="form-label fw-semibold">Rendimiento anual (%)</label>
                <input type="number" class="form-control" id="inputRendimiento" placeholder="10" min="0" step="0.1" value="10">
            </div>
            <button class="btn btn-widata w-100 rounded-pill fw-bold" onclick="calcularAhorro()">
                <i class="fa-solid fa-chart-line me-1"></i> Calcular
            </button>
        </div>
    </div>

    <!-- Results -->
    <div class="col-lg-7" id="resultados" style="display:none;">
        <div class="w-card">
            <h5 class="fw-bold mb-4" id="resultTitle"><i class="fa-solid fa-chart-bar me-2" style="color: var(--wi-purple-light);"></i> Resultados</h5>
            
            <div class="row g-3 mb-4" id="resultStats"></div>

            <!-- Chart -->
            <div style="height: 280px;">
                <canvas id="calcChart"></canvas>
            </div>
            
            <div class="mt-3 p-3 rounded-4" id="resultTip" style="background: rgba(130,10,209,0.08); border: 1px solid var(--wi-border-light);"></div>
        </div>
    </div>
</div>

{% endblock %}

{% block scripts %}
<script>
let chart = null;

function switchTab(tab) {
    document.getElementById('formDeuda').style.display = tab === 'deuda' ? '' : 'none';
    document.getElementById('formAhorro').style.display = tab === 'ahorro' ? '' : 'none';
    document.getElementById('resultados').style.display = 'none';
    
    const btnD = document.getElementById('btnDeuda');
    const btnA = document.getElementById('btnAhorro');
    if (tab === 'deuda') {
        btnD.className = 'btn btn-widata rounded-pill px-4';
        btnA.className = 'btn btn-outline-light rounded-pill px-4';
    } else {
        btnA.className = 'btn btn-widata rounded-pill px-4';
        btnD.className = 'btn btn-outline-light rounded-pill px-4';
    }
}

async function calcularDeuda() {
    const deuda = document.getElementById('inputDeuda').value;
    const tasa = document.getElementById('inputTasa').value;
    const pago = document.getElementById('inputPago').value;

    const res = await fetch('/dashboard/api/calcular', {
        method: 'POST',
        headers: {'Content-Type': 'application/json', 'X-CSRFToken': document.querySelector('[name=csrf_token]').value},
        body: JSON.stringify({tipo: 'deuda', deuda, tasa, pago})
    });
    const data = await res.json();
    if (data.error) { alert(data.error); return; }

    document.getElementById('resultados').style.display = '';
    document.getElementById('resultTitle').innerHTML = '<i class="fa-solid fa-chart-bar me-2" style="color: var(--wi-purple-light);"></i> Tu plan para liquidar la deuda';
    
    document.getElementById('resultStats').innerHTML = `
        <div class="col-6 col-md-3"><div class="stat-box"><div class="stat-number">${data.meses}</div><small class="text-muted">Meses</small></div></div>
        <div class="col-6 col-md-3"><div class="stat-box"><div class="stat-number">${data.anios}</div><small class="text-muted">Años</small></div></div>
        <div class="col-6 col-md-3"><div class="stat-box"><div class="stat-number">$${(data.total_pagado/1000).toFixed(0)}k</div><small class="text-muted">Total pagado</small></div></div>
        <div class="col-6 col-md-3"><div class="stat-box"><div class="stat-number">$${(data.intereses/1000).toFixed(0)}k</div><small class="text-muted">Intereses</small></div></div>`;

    document.getElementById('resultTip').innerHTML = `<i class="fa-solid fa-lightbulb me-2" style="color: var(--wi-purple-light);"></i> <strong>Tip:</strong> Si incrementas tu pago mensual un 20% ($${Math.round(pago * 1.2).toLocaleString()}), podrías ahorrar miles en intereses. ¡Intenta simularlo!`;

    drawChart(data.historial.map(h => `Mes ${h.mes}`), data.historial.map(h => h.saldo), 'Saldo restante ($)', 'rgba(130, 10, 209, 0.6)', 'rgba(130, 10, 209, 0.1)');
}

async function calcularAhorro() {
    const meta = document.getElementById('inputMeta').value;
    const ahorro = document.getElementById('inputAhorro').value;
    const rendimiento = document.getElementById('inputRendimiento').value;

    const res = await fetch('/dashboard/api/calcular', {
        method: 'POST',
        headers: {'Content-Type': 'application/json', 'X-CSRFToken': document.querySelector('[name=csrf_token]').value},
        body: JSON.stringify({tipo: 'ahorro', meta, ahorro, rendimiento})
    });
    const data = await res.json();
    if (data.error) { alert(data.error); return; }

    document.getElementById('resultados').style.display = '';
    document.getElementById('resultTitle').innerHTML = '<i class="fa-solid fa-piggy-bank me-2" style="color: var(--wi-green);"></i> Tu plan de ahorro';
    
    document.getElementById('resultStats').innerHTML = `
        <div class="col-6 col-md-3"><div class="stat-box"><div class="stat-number">${data.meses}</div><small class="text-muted">Meses</small></div></div>
        <div class="col-6 col-md-3"><div class="stat-box"><div class="stat-number">${data.anios}</div><small class="text-muted">Años</small></div></div>
        <div class="col-6 col-md-3"><div class="stat-box"><div class="stat-number">$${(data.total_aportado/1000).toFixed(0)}k</div><small class="text-muted">Tu aporte</small></div></div>
        <div class="col-6 col-md-3"><div class="stat-box"><div class="stat-number">$${(data.rendimientos/1000).toFixed(0)}k</div><small class="text-muted">Rendimientos</small></div></div>`;

    document.getElementById('resultTip').innerHTML = `<i class="fa-solid fa-lightbulb me-2" style="color: var(--wi-green);"></i> <strong>Genial:</strong> El interés compuesto generaría $${data.rendimientos.toLocaleString()} extra para ti. ¡El dinero trabaja por ti!`;

    drawChart(data.historial.map(h => `Mes ${h.mes}`), data.historial.map(h => h.acumulado), 'Acumulado ($)', 'rgba(16, 185, 129, 0.6)', 'rgba(16, 185, 129, 0.1)');
}

function drawChart(labels, data, label, borderColor, bgColor) {
    if (chart) chart.destroy();
    const ctx = document.getElementById('calcChart').getContext('2d');
    chart = new Chart(ctx, {
        type: 'line',
        data: {
            labels,
            datasets: [{
                label, data,
                borderColor, backgroundColor: bgColor,
                fill: true, tension: 0.4,
                pointRadius: 4, pointHoverRadius: 7,
                borderWidth: 2
            }]
        },
        options: {
            responsive: true, maintainAspectRatio: false,
            plugins: { legend: { labels: { color: getComputedStyle(document.documentElement).getPropertyValue('--wi-text').trim() } } },
            scales: {
                x: { ticks: { color: getComputedStyle(document.documentElement).getPropertyValue('--wi-text-muted').trim(), maxTicksLimit: 8 }, grid: { color: 'rgba(130,10,209,0.06)' } },
                y: { ticks: { color: getComputedStyle(document.documentElement).getPropertyValue('--wi-text-muted').trim(), callback: v => '$' + (v/1000).toFixed(0) + 'k' }, grid: { color: 'rgba(130,10,209,0.06)' } }
            }
        }
    });
}
</script>
{% endblock %}
